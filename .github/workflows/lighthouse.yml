name: Lighthouse Audit

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: ⏳ Wait for Vercel preview to be live
        run: |
          PREVIEW_URL="https://auth-new.vercel.app"
          echo "PREVIEW_URL=$PREVIEW_URL" >> "$GITHUB_ENV"
          for i in {1..2}; do
            if curl -s --head "$PREVIEW_URL" | grep "200 OK" > /dev/null; then
              echo "Preview is live!"
              break
            fi
            echo "Waiting for Netlify to deploy... ($i/2)"
            sleep 5
          done
      - name: ⚙️ Install unlighthouse
        run: npm install -g @unlighthouse/cli puppeteer

      - name: 📊 Run Lighthouse audits (Mobile & Desktop)
        run: |
          for device in mobile desktop; do
            echo "Running audit for: $device"
            unlighthouse-ci --site "$PREVIEW_URL" \
              --$device \
              --urls /,/login,/signup \
              --disable-dynamic-sampling \
              --disable-sitemap \
              --disable-robots-txt
      
            mv ./.unlighthouse/ci-result.json "./.unlighthouse/ci-${device}.json"
          done
          
      - name: 📄 Log formatted comment
        run: | 
          cat ./.unlighthouse/ci-mobile.json
          cat ./.unlighthouse/ci-desktop.json

      - name: Upload Lighthouse reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: |
            ./.unlighthouse/ci-mobile.json
            ./.unlighthouse/ci-desktop.json

      - name: 💬 Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
      
            const stoplight = res => (res >= 90 ? '🟢' : res >= 70 ? '🟠' : '🔴');
            const normalize = res => Math.round(res * 100);
            const format = res => `${stoplight(normalize(res))} ${normalize(res)}%`;
      
            const read = path => JSON.parse(fs.readFileSync(path, 'utf8'));
      
            const mobileResults = read('./.unlighthouse/ci-mobile.json');
            const desktopResults = read('./.unlighthouse/ci-desktop.json');
      
            const buildTable = (title, results) => {
              const header = [
                `### ${title}`,
                '',
                '| Page | Performance | Accessibility | Best Practices | SEO |',
                '|------|-------------|---------------|----------------|-----|'
              ];
              const rows = results.map(r => {
                return `| \`${r.path}\` | ${format(r.performance)} | ${format(r.accessibility)} | ${format(r['best-practices'])} | ${format(r.seo)} |`;
              });
              return [...header, ...rows].join('\n');
            };
      
            const comment = [
              '## 📊 Lighthouse Audit Results',
              '',
              buildTable('📱 Mobile Lighthouse Audit Results', mobileResults),
              '',
              buildTable('🖥️ Desktop Lighthouse Audit Results', desktopResults)
            ].join('\n\n');

            const { data: comments } = await github.rest.issues.listComments({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            const botComment = comments.find(comment =>
              comment.user.type === "Bot" &&
              comment.body.includes("📊 Lighthouse Audit Results")
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                comment_id: botComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: comment,
              });
            }
