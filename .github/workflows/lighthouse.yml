name: Lighthouse Audit

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: ⏳ Wait for Vercel preview to be live
        run: |
          PREVIEW_URL="https://auth-new.vercel.app"
          echo "PREVIEW_URL=$PREVIEW_URL" >> "$GITHUB_ENV"
          for i in {1..2}; do
            if curl -s --head "$PREVIEW_URL" | grep "200 OK" > /dev/null; then
              echo "Preview is live!"
              break
            fi
            echo "Waiting for Netlify to deploy... ($i/2)"
            sleep 5
          done
      - name: ⚙️ Install unlighthouse
        run: npm install -g @unlighthouse/cli puppeteer

      - name: 📊 Run Lighthouse audits
        run: unlighthouse-ci --site "$PREVIEW_URL" --urls  /,/login,/signup --disable-dynamic-sampling --disable-sitemap --disable-robots-txt

      - name: 📄 Log formatted comment
        run: cat ./.unlighthouse/ci-result.json

      - name: Upload Lighthouse reports as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: ./.unlighthouse/ci-result.json

      - name: 💬 Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
      
            // Emoji based on score thresholds
            const stoplight = res => (res >= 90 ? '🟢' : res >= 75 ? '🟠' : '🔴');
            const normalizeScore = res => Math.round(res * 100);
            const formatScore = res => {
              const s = normalizeScore(res);
              return `${stoplight(s)} ${s}%`;
            };
      
            // Read Unlighthouse JSON
            const results = JSON.parse(fs.readFileSync('./.unlighthouse/ci-result.json', 'utf8'));
      
            const header = [
              '## 📊 Lighthouse Audit Results',
              '',
              '| Page | Performance | Accessibility | Best Practices | SEO |',
              '|------|-------------|---------------|----------------|-----|',
            ];
      
            const rows = results.map(result => {
              const path = `\`${result.path}\``;
              const perf = formatScore(result.performance);
              const a11y = formatScore(result.accessibility);
              const bp = formatScore(result['best-practices']);
              const seo = formatScore(result.seo);
      
              return `| ${path} | ${perf} | ${a11y} | ${bp} | ${seo} |`;
            });
      
            const comment = [...header, ...rows].join('\n');
      
            // Post comment to PR
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
