name: Lighthouse Audit

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  lighthouse:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout PR code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: ⏳ Wait for Vercel preview to be live
        run: |
          PREVIEW_URL="https://auth-new.vercel.app"
          echo "PREVIEW_URL=$PREVIEW_URL" >> "$GITHUB_ENV"
          for i in {1..2}; do
            if curl -s --head "$PREVIEW_URL" | grep "200 OK" > /dev/null; then
              echo "Preview is live!"
              break
            fi
            echo "Waiting for Netlify to deploy... ($i/2)"
            sleep 5
          done
      - name: ⚙️ Install unlighthouse
        run: npm install -g @unlighthouse/cli puppeteer

      - name: 📊 Run Lighthouse audits
        run: unlighthouse-ci --site "$PREVIEW_URL" --urls  /,/login,/signup --disable-dynamic-sampling --disable-sitemap --disable-robots-txt

      - name: 🧾 Format Lighthouse results
        id: format
        run: |
          echo '📊 **Lighthouse Audit Results**' > comment.md
          echo '' >> comment.md
          echo '| Page | Performance | Accessibility | Best Practices | SEO |' >> comment.md
          echo '|------|-------------|---------------|----------------|-----|' >> comment.md

          jq -c '.[]' ./.unlighthouse/ci-result.json | while read -r row; do
            path=$(echo "$row" | jq -r '.path')

            for field in performance accessibility "best-practices" seo; do
              score=$(echo "$row" | jq -r ".\"$field\" * 100")
              if (( $(echo "$score >= 90" | bc -l) )); then
                emoji="🟢"
              elif (( $(echo "$score >= 70" | bc -l) )); then
                emoji="🟠"
              else
                emoji="🔴"
              fi
              declare "$field"="$emoji $score%"
            done

            echo "| \`$path\` | $performance | $accessibility | ${best-practices} | $seo |" >> comment.md
          done

          echo "comment<<EOF" >> $GITHUB_OUTPUT
          cat comment.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 📄 Log formatted comment
        run: cat comment.md

      - name: 💬 Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.payload.pull_request.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: process.env.comment
            })
        env:
          comment: ${{ steps.format.outputs.comment }}
